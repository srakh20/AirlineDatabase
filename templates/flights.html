<h2>Flights</h2>

<table border="1">
<tr>
    <th>Flight Number</th>
    <th>Departure Date</th>
    <th>Origin</th>
    <th>Destination</th>
    <th>Departure Time</th>
</tr>

{% for f in flights %}
<tr>
    <td>
        <a href="/flight/{{ f[0] }}/{{ f[1] }}">
            {{ f[0] }}
        </a>
    </td>
    <td>{{ f[1] }}</td>
    <td>{{ f[2] }}</td>
    <td>{{ f[3] }}</td>
    <td>{{ f[4] }}</td>
</tr>
{% endfor %}

</table>
